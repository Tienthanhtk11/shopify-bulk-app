query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
        compareAtAmountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            metafield(namespace: "app", key: "bulk_pricing") {
              value
            }
          }
        }
      }
      sellingPlanAllocation {
        sellingPlan {
          id
          name
        }
      }
    }
  }
}
